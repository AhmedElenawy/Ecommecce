<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice #{{ order.id }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --slate-50: #f8fafc; --slate-100: #f1f5f9; --slate-200: #e2e8f0;
            --slate-400: #94a3b8; --slate-500: #64748b; --slate-600: #475569;
            --slate-700: #334155; --slate-900: #0f172a;
            --cyan-50: #ecfeff; --cyan-500: #06b6d4; --cyan-600: #0891b2;
            --emerald-50: #ecfdf5; --emerald-500: #10b981; --emerald-700: #047857;
            --rose-50: #fff1f2; --rose-500: #f43f5e; --rose-700: #be123c;
            --amber-50: #fffbeb; --amber-500: #f59e0b; --amber-700: #b45309;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--slate-700);
            background: var(--slate-50);
            padding: 40px 20px;
            -webkit-font-smoothing: antialiased;
        }

        /* Main Canvas / Card */
        .invoice-container {
            max-width: 850px;
            margin: 0 auto;
            background: #fff;
            border-radius: 2rem; /* Matches your UI */
            padding: 50px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01);
            border: 1px solid var(--slate-100);
        }

        /* Header Section */
        .invoice-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 40px;
            padding-bottom: 30px;
            border-bottom: 1px solid var(--slate-100);
        }

        .company-info { display: flex; align-items: center; gap: 15px; }
        .logo-placeholder {
            width: 50px; height: 50px;
            background: var(--slate-900);
            border-radius: 1rem;
            display: flex; align-items: center; justify-content: center;
            color: #fff;
        }
        .logo-placeholder svg { width: 28px; height: 28px; }

        .company-info h1 { font-size: 28px; color: var(--slate-900); font-weight: 900; letter-spacing: -0.5px; margin-bottom: 2px; }
        .company-info p { color: var(--slate-500); font-size: 13px; font-weight: 500; }

        .invoice-meta { text-align: right; }
        .invoice-meta h2 { font-size: 20px; color: var(--slate-400); font-weight: 900; letter-spacing: 2px; margin-bottom: 15px; }
        .meta-item { font-size: 13px; color: var(--slate-500); margin-bottom: 4px; }
        .meta-item span { margin-right: 8px; }
        .meta-item strong { color: var(--slate-900); }

        /* Modern Pill Badges */
        .status-wrapper { margin-top: 15px; display: flex; justify-content: flex-end; }
        .status {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 6px 12px; border-radius: 20px;
            font-size: 11px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.5px; border: 1px solid transparent;
        }
        .status .dot { width: 6px; height: 6px; border-radius: 50%; }

        .status.paid { background-color: var(--emerald-50); color: var(--emerald-700); border-color: #a7f3d0; }
        .status.paid .dot { background-color: var(--emerald-500); }
        .status.pending { background-color: var(--amber-50); color: var(--amber-700); border-color: #fde68a; }
        .status.pending .dot { background-color: var(--amber-500); }
        .status.shipped { background-color: var(--cyan-50); color: var(--cyan-600); border-color: #cffafe; }
        .status.shipped .dot { background-color: var(--cyan-500); }
        .status.delivered { background-color: var(--emerald-50); color: var(--emerald-700); border-color: #a7f3d0; }
        .status.delivered .dot { background-color: var(--emerald-500); }
        .status.cancelled { background-color: var(--rose-50); color: var(--rose-700); border-color: #fecdd3; }
        .status.cancelled .dot { background-color: var(--rose-500); }

        /* Billing Cards */
        .billing-section {
            display: flex; gap: 20px; margin-bottom: 40px;
        }
        .billing-card {
            flex: 1; background: var(--slate-50);
            padding: 20px; border-radius: 1.5rem;
            border: 1px solid var(--slate-100);
        }
        .billing-card h3 {
            font-size: 11px; text-transform: uppercase; color: var(--slate-400);
            letter-spacing: 1px; margin-bottom: 10px; font-weight: 700;
        }
        .billing-card p { font-size: 13px; color: var(--slate-600); line-height: 1.6; }
        .billing-card .customer-name { font-size: 15px; font-weight: 700; color: var(--slate-900); margin-bottom: 4px; }

        /* Modern Table */
        .table-wrapper { border: 1px solid var(--slate-100); border-radius: 1.5rem; overflow: hidden; margin-bottom: 30px; }
        .items-table { width: 100%; border-collapse: collapse; }
        .items-table thead { background-color: var(--slate-50); border-bottom: 1px solid var(--slate-100); }
        .items-table th {
            padding: 16px 20px; font-size: 11px; text-transform: uppercase;
            color: var(--slate-500); font-weight: 700; letter-spacing: 1px;
            text-align: left;
        }
        .items-table td { padding: 16px 20px; font-size: 14px; border-bottom: 1px solid var(--slate-50); }
        .items-table tr:last-child td { border-bottom: none; }
        
        .item-name { font-weight: 700; color: var(--slate-900); }
        .item-category span {
            background: var(--slate-100); padding: 4px 8px;
            border-radius: 6px; font-size: 11px; font-weight: 600; color: var(--slate-500);
        }
        .text-right { text-align: right !important; }
        .text-center { text-align: center !important; }
        .font-bold { font-weight: 700; color: var(--slate-900); }

        /* Totals Section */
        .totals-container { display: flex; justify-content: flex-end; margin-bottom: 40px; }
        .totals-section { width: 350px; background: var(--slate-50); padding: 20px; border-radius: 1.5rem; border: 1px solid var(--slate-100); }
        .totals-row { display: flex; justify-content: space-between; padding: 8px 0; font-size: 14px; font-weight: 500; color: var(--slate-600); }
        .totals-row.discount { color: var(--emerald-600); }
        .totals-row.shipping { padding-bottom: 15px; border-bottom: 1px solid var(--slate-200); margin-bottom: 10px; }
        .totals-row.total { font-size: 18px; font-weight: 900; color: var(--slate-900); padding-top: 5px; }

        /* Footer */
        .invoice-footer { text-align: center; border-top: 1px dashed var(--slate-200); padding-top: 30px; }
        .invoice-footer .thank-you { font-size: 16px; color: var(--slate-900); font-weight: 700; margin-bottom: 8px; }
        .invoice-footer p { font-size: 12px; color: var(--slate-500); margin-bottom: 4px; }
        .invoice-footer .payment-id { font-family: monospace; font-size: 11px; color: var(--slate-400); margin-top: 10px; }

        /* Print Optimization - Strips backgrounds and shadows for clean printing */
        @media print {
            body { background: #fff; padding: 0; }
            .invoice-container { box-shadow: none; border: none; padding: 0; border-radius: 0; max-width: 100%; }
            .billing-card, .table-wrapper, .totals-section { border: 1px solid #ccc; }
        }
    </style>
</head>

<body>
    <div class="invoice-container">
        {% include 'order/invoice_card.html' with order=order %}
    </div>
</body>

</html>
